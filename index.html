<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Antoine — Playables</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:#0a0a0f;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    background-image:radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 60%);
  }
  .header{
    padding:48px 24px 16px;
    text-align:center;
  }
  .brand{
    font-size:32px;
    font-weight:900;
    letter-spacing:-0.5px;
    background:linear-gradient(135deg,#FFB84D 0%,#FF6B1A 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    display:inline-block;
    margin-bottom:4px;
  }
  .tagline{
    color:#888;
    font-size:14px;
    font-weight:500;
  }
  .row{
    padding:24px 24px 48px;
    max-width:1200px;
    margin:0 auto;
  }
  .row-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:16px;
    color:#fff;
    letter-spacing:-0.2px;
  }
  .row-title .count{
    color:#666;
    font-weight:500;
    margin-left:8px;
    font-size:14px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:16px;
  }
  .card{
    position:relative;
    aspect-ratio:9/16;
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.18s ease, box-shadow 0.18s ease;
    background:#1a1a2e;
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
    text-decoration:none;
    color:inherit;
  }
  .card:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:0 10px 30px rgba(255,107,26,0.25);
  }
  .card-thumb{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:80px;
    background:linear-gradient(135deg, var(--c1, #85C53A) 0%, var(--c2, #3F7A1F) 100%);
  }
  .card-thumb .emoji{filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
  .card-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:14px 14px 16px;
  }
  .card-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:2px;
    letter-spacing:-0.3px;
  }
  .card-sub{
    font-size:12px;
    color:#bbb;
    font-weight:500;
  }
  .card-badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:3px 9px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(8px);
    border-radius:6px;
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#FFD700;
  }
  .card-placeholder{
    opacity:0.4;
  }
  .card-placeholder:hover{
    transform:none;
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
    cursor:not-allowed;
  }
  .footer{
    padding:32px 24px;
    text-align:center;
    color:#555;
    font-size:12px;
    border-top:1px solid #1a1a2e;
    margin-top:24px;
  }
  @media (max-width:480px){
    .header{padding:32px 16px 8px}
    .brand{font-size:26px}
    .row{padding:16px 16px 32px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
    .card-thumb{font-size:60px}
    .card-title{font-size:15px}
  }
</style>
</head>
<body>
  <header class="header">
    <div class="brand">Antoine's Playables</div>
    <div class="tagline">Mini-jeux interactifs · prototypes ad</div>
  </header>

  <section class="row">
    <h2 class="row-title">Mes playables <span class="count">— 1 jeu</span></h2>
    <div class="grid">
      <a class="card" href="games/farm-sort/" style="--c1:#85C53A;--c2:#3F7A1F">
        <div class="card-thumb">
          <span class="emoji">🚜</span>
        </div>
        <div class="card-overlay">
          <div class="card-title">Farm Sort</div>
          <div class="card-sub">Sort produce into tractors · 25s</div>
        </div>
        <div class="card-badge">NEW</div>
      </a>

      <!--
        Pour ajouter un autre playable :
        1. Crée un nouveau dossier dans games/ (ex. games/tower-run/)
        2. Mets-y un index.html (le fichier dist/playable.html de ton playable)
        3. Copie-colle la balise <a class="card"> ci-dessus, change href + titre + emoji + couleurs
      -->
      <div class="card card-placeholder" style="--c1:#4FB8E5;--c2:#1E5A8F">
        <div class="card-thumb">
          <span class="emoji">➕</span>
        </div>
        <div class="card-overlay">
          <div class="card-title">Bientôt</div>
          <div class="card-sub">Prochain playable en construction</div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    Built with /playable-blitz · <a href="https://github.com" style="color:#FF6B1A;text-decoration:none">GitHub</a>
  </footer>
</body>
</html>
